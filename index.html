<!DOCTYPE html>
<html>
<head>
  <title>Carson SMP Games</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #181818;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 60px;
    }

    .subtitle {
      margin-top: 10px;
      color: white;
      font-size: 36px;
    }

    /* BUTTONS */
    .game-button {
      margin: 20px;
      padding: 15px 30px;
      font-size: 20px;
      background-color: #333;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    .game-button:hover {
      background-color: #555;
    }

    /* POPUP */
    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      width: 80%;
      height: 80%;
      background: #000;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 25px;
      cursor: pointer;
      color: white;
      z-index: 10;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Carson SMP Games</h1>
    <div class="subtitle">By Dankle and Really Cool Guy</div>
  </header>

  <!-- GAME BUTTONS -->
  <button class="game-button" onclick="openGame('https://example.com')">Game 1</button>
  <button class="game-button" onclick="openGame('https://example.com')">Game 2</button>

  <!-- POPUP -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close-btn" onclick="closeGame()">✖</span>
      <iframe id="gameFrame"></iframe>
    </div>
  </div>

  <script>
    function openGame(url) {
      document.getElementById("popup").style.display = "flex";
      document.getElementById("gameFrame").src = url;
    }

    function closeGame() {
      document.getElementById("popup").style.display = "none";
      document.getElementById("gameFrame").src = "";
    }
  </script>

</body>
</html>
